<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MEOW — AI Tutor</title>
    <meta name="description" content="MEOW: An elegant, minimal multi-model AI tutor.">

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#fdfaf6">
    <link rel="apple-touch-icon" href="icons/icon-192x192.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="MEOW">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Newsreader:opsz,wght@6..72,400;6..72,500;6..72,600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <link rel="stylesheet" href="style.css?v=4">
    
    <!-- KaTeX for Math Rendering -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    
    <!-- Prism.js for Syntax Highlighting -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/plugins/toolbar/prism-toolbar.min.css" rel="stylesheet" />
</head>
<body>

<!-- ─── Splash Screen ─── -->
<div id="splash-screen" class="splash-screen">
    <div class="splash-content">
        <div class="splash-title">MEOW</div>
        <div class="splash-subtitle">created by Nitesh</div>
    </div>
</div>

<!-- ─── Sidebar: Chat History ─── -->
<aside id="sidebar" class="sidebar">
    <div class="sidebar-header">
        <button id="new-chat-sidebar-btn" class="btn-new-chat">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
            New chat
        </button>
        <button id="sidebar-close" class="btn-icon" aria-label="Close sidebar">✕</button>
    </div>
    
    <div class="sidebar-section-title">Recent</div>
    <div id="history-list" class="history-list">
        <!-- History items populated via JS -->
    </div>
</aside>

<!-- ─── Sidebar Overlay ─── -->
<div id="sidebar-overlay" class="sidebar-overlay"></div>

<!-- ─── Main App ─── -->
<main class="app-container">

    <!-- Top bar -->
    <header class="top-bar">
        <button id="sidebar-toggle" class="btn-icon" aria-label="Toggle history sidebar">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
        </button>
        <div class="top-bar-title">MEOW</div>
        <div style="display: flex; gap: 8px;">
            <button id="theme-toggle-btn" class="btn-icon" aria-label="Toggle dark/light theme" title="Toggle Theme">
                <svg id="theme-icon-sun" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="display:none;"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
                <svg id="theme-icon-moon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
            </button>
            <button id="export-pdf-btn" class="btn-icon" aria-label="Export Chat to PDF" onclick="exportChatToPDF()" title="Download PDF">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
            </button>
        </div>
    </header>

    <!-- Main Content Area (Scrollable) -->
    <div id="scroll-container" class="scroll-container">
        <!-- Hero Section (Greeting) -->
        <section id="hero-section" class="hero-section">
            <div class="avatar-large">M</div>
            <h1 id="hero-greeting" class="hero-title">Welcome.</h1>
            <p class="hero-subtitle">How can I help you learn today?</p>
        </section>

        <!-- Chat Area -->
        <section id="chat-area" class="chat-area">
            <div id="messages-container" class="messages-container"></div>
            <!-- Empty space element so the last message isn't hidden behind the input bar -->
            <div class="scroll-spacer"></div>
        </section>
    </div>

    <!-- Floating Input Bar -->
    <div class="input-container">
        <div class="input-wrapper">
            <button id="attach-btn" class="action-btn" aria-label="Attach File">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
            </button>
            <input type="file" id="file-upload" accept=".txt,.csv,.pdf" style="display: none;">
            
            <textarea
                id="user-input"
                placeholder="Message MEOW..."
                rows="1"
                aria-label="Type your question"
            ></textarea>
            
            <button id="mic-btn" class="action-btn" aria-label="Voice Input">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="23"></line><line x1="8" y1="23" x2="16" y2="23"></line></svg>
            </button>
            <button id="send-btn" class="send-btn" aria-label="Send message" disabled>
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
            </button>
        </div>
        <div class="input-footer">created by Mr.dark</div>
    </div>

</main>

<!-- KaTeX scripts -->
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>

<!-- Prism scripts -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-javascript.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-bash.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/plugins/toolbar/prism-toolbar.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/plugins/copy-to-clipboard/prism-copy-to-clipboard.min.js"></script>

<script src="app.js?v=4"></script>
<script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(reg => console.log('Service Worker registered', reg))
          .catch(err => console.log('Service Worker registration failed', err));
      });
    }
</script>
</body>
</html>
